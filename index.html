<!DOCTYPE html>
<html>
    <head>
        <title>Virtual garden</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Virtual Garden</h1>
        <p>coins:<span id="coins">0</span></p>
        <h2>weather</h2>
        <p id="weather">sunny</p>
        <h2>flower album</h2>
        <div id="album">
            no flowers discovered yet!
        </div>
        <button id="plantBtn">plant flower</button>
        <h2>garden size</h2>
        <p>plots:<span id="plots">1</span></p>
        <button id="expandBtn">
            buy new plot (50 coins)
        </button>
        <div id="garden"></div>
        <button id="waterBtn">water garden</button>
        <h2>collection</h2>
        <p>flowers collected: <span id="count">0</span></p>
        <h2>achievements</h2>
        <div id="achievements">
            no achievements yet
        </div>
        <script src="script.js"></script>
    </body>
</html>
